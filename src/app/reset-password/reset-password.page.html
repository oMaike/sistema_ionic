<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Redefinir Senha</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div style="margin-top: 20px;">
    <h2>Crie uma nova senha</h2>
    <p>Preencha os campos abaixo para recuperar o acesso à sua conta.</p>

    <ion-item lines="full" class="ion-margin-top">
      <ion-label position="stacked">Nova Senha</ion-label>
      <ion-input 
        type="password" 
        [(ngModel)]="newPassword" 
        placeholder="Mínimo 8 caracteres, com letras e números">
      </ion-input>
    </ion-item>

    <ion-item lines="full" class="ion-margin-top">
      <ion-label position="stacked">Confirmar Nova Senha</ion-label>
      <ion-input 
        type="password" 
        [(ngModel)]="confirmPassword" 
        placeholder="Repita a senha">
      </ion-input>
    </ion-item>

    <ion-button 
      expand="block" 
      (click)="salvarSenha()" 
      class="ion-margin-top"
      [disabled]="isLoading || !token || !newPassword || newPassword !== confirmPassword || newPassword.length < 8">
      {{ isLoading ? 'Atualizando...' : 'Atualizar Senha' }}
    </ion-button>

    <p *ngIf="!token" style="color: var(--ion-color-danger); font-size: 14px;">
      Link de recuperação inválido ou sem token.
    </p>

    <p *ngIf="newPassword && confirmPassword && newPassword !== confirmPassword" style="color: var(--ion-color-danger); font-size: 14px;">
      As senhas não coincidem.
    </p>
  </div>
</ion-content>
