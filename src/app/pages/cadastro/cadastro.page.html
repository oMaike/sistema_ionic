<ion-content class="cadastro-content" [fullscreen]="true">
  <main class="cadastro-shell">
    <section class="cadastro-card" aria-label="Solicitacao de acesso">
      <div class="cadastro-visual">
        <div class="brand-mark">
          <img src="assets/icon/favicon.png" alt="Sistema">
        </div>
        <div class="visual-copy">
          <span class="eyebrow">Cadastro de queijo</span>
          <h1>Novo queijo</h1>
          <p>Cadastre o queijo para solicitar acesso ao sistema.</p>
        </div>
      </div>

      <form class="cadastro-form" (ngSubmit)="cadastrar()">
        <div class="field-group" [class.field-error]="erros.nome" [class.field-valid]="!erros.nome && novoUsuario.nome">
          <label class="field-label">
            <ion-icon name="person-outline"></ion-icon>
            Nome do queijo
          </label>
          <div class="field-input">
            <ion-input
              name="nome"
              [(ngModel)]="novoUsuario.nome"
              placeholder="Ex: Minas artesanal"
              autocomplete="name"
              (ionInput)="validarCampo('nome')"
              (ionBlur)="validarCampo('nome')">
            </ion-input>
          </div>
          <span class="field-msg" *ngIf="erros.nome">{{ erros.nome }}</span>
        </div>

        <div class="field-group" [class.field-error]="erros.email" [class.field-valid]="!erros.email && novoUsuario.email">
          <label class="field-label">
            <ion-icon name="mail-outline"></ion-icon>
            Login / e-mail
          </label>
          <div class="field-input">
            <ion-input
              name="email"
              [(ngModel)]="novoUsuario.email"
              type="email"
              placeholder="nome@email.com"
              autocomplete="email"
              inputmode="email"
              (ionInput)="validarCampo('email')"
              (ionBlur)="validarCampo('email')">
            </ion-input>
          </div>
          <span class="field-msg" *ngIf="erros.email">{{ erros.email }}</span>
        </div>

        <div class="field-group" [class.field-error]="erros.senha" [class.field-valid]="!erros.senha && novoUsuario.senha">
          <label class="field-label">
            <ion-icon name="lock-closed-outline"></ion-icon>
            Senha
          </label>
          <div class="field-input">
            <ion-input
              name="senha"
              [(ngModel)]="novoUsuario.senha"
              type="password"
              placeholder="Minimo 8 caracteres"
              autocomplete="new-password"
              (ionInput)="validarCampo('senha')"
              (ionBlur)="validarCampo('senha')">
              <ion-input-password-toggle slot="end"></ion-input-password-toggle>
            </ion-input>
          </div>

          <div class="senha-strength" *ngIf="novoUsuario.senha">
            <div class="strength-bar">
              <div
                class="strength-fill"
                [style.width]="forcaSenha.pct + '%'"
                [class]="'strength-' + forcaSenha.nivel">
              </div>
            </div>
            <span class="strength-label" [class]="'strength-' + forcaSenha.nivel">
              {{ forcaSenha.texto }}
            </span>
          </div>

          <span class="field-msg" *ngIf="erros.senha">{{ erros.senha }}</span>
        </div>

        <div class="field-group" [class.field-error]="erros.confirmarSenha" [class.field-valid]="!erros.confirmarSenha && confirmarSenha && confirmarSenha === novoUsuario.senha">
          <label class="field-label">
            <ion-icon name="shield-checkmark-outline"></ion-icon>
            Confirmar senha
          </label>
          <div class="field-input">
            <ion-input
              name="confirmarSenha"
              [(ngModel)]="confirmarSenha"
              type="password"
              placeholder="Repita a senha"
              autocomplete="new-password"
              (ionInput)="validarCampo('confirmarSenha')"
              (ionBlur)="validarCampo('confirmarSenha')">
              <ion-input-password-toggle slot="end"></ion-input-password-toggle>
            </ion-input>
          </div>
          <span class="field-msg" *ngIf="erros.confirmarSenha">{{ erros.confirmarSenha }}</span>
        </div>

        <div class="cadastro-actions">
          <ion-button
            type="submit"
            expand="block"
            class="btn-cadastrar"
            [disabled]="carregando">
            <ion-spinner *ngIf="carregando" name="crescent"></ion-spinner>
            <ng-container *ngIf="!carregando">
              <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
              Solicitar cadastro
            </ng-container>
          </ion-button>

          <ion-button
            type="button"
            expand="block"
            fill="clear"
            class="btn-cancelar"
            (click)="irParaLogin()"
            [disabled]="carregando">
            <ion-icon name="close-outline" slot="start"></ion-icon>
            Cancelar
          </ion-button>
        </div>
      </form>

      <div class="cadastro-note">
        <ion-icon name="information-circle-outline"></ion-icon>
        <span>Depois do cadastro, aguarde a aprovacao do administrador para entrar.</span>
      </div>
    </section>
  </main>
</ion-content>
