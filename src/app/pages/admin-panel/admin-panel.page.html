<ion-menu contentId="main-content">
  <ion-header>
    <ion-toolbar color="light">
      <ion-title>Menu Admin</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>

    <!-- SEÇÃO 1: Aprovações Pendentes -->
    <ion-list lines="full">
      <ion-list-header>
        <ion-label color="primary">
          Aprovações Pendentes
          <ion-badge *ngIf="pendentes.length > 0" color="danger" style="margin-left: 8px;">
            {{ pendentes.length }}
          </ion-badge>
        </ion-label>
      </ion-list-header>

      <ion-item *ngIf="pendentes.length === 0">
        <ion-icon slot="start" name="checkmark-circle-outline" color="success"></ion-icon>
        <ion-label color="medium">Nenhuma pendência</ion-label>
      </ion-item>

      <ion-item *ngFor="let user of pendentes">
        <ion-avatar slot="start">
          <ion-icon name="person-circle-outline" style="font-size: 36px; color: var(--ion-color-medium)"></ion-icon>
        </ion-avatar>
        <ion-label>
          <h2 style="font-weight: bold;">{{ user.nome }}</h2>
          <p>{{ user.email }}</p>
          <div class="ion-margin-top">
            <ion-button size="small" [disabled]="isLoading" (click)="aprovar(user.id)">
              <ion-icon slot="start" name="checkmark-outline"></ion-icon>
              Aprovar
            </ion-button>
            <ion-button size="small" color="danger" fill="clear" [disabled]="isLoading" (click)="deletar(user.id)">
              <ion-icon slot="start" name="close-outline"></ion-icon>
              Recusar
            </ion-button>
          </div>
        </ion-label>
      </ion-item>
    </ion-list>

    <!-- Acesso aos gráficos -->
    <ion-list lines="full">
      <ion-item button (click)="setOpen(true)">
        <ion-icon slot="start" name="bar-chart-outline" color="tertiary"></ion-icon>
        <ion-label>Ver Gráficos do Sistema</ion-label>
        <ion-icon slot="end" name="chevron-forward-outline" color="medium"></ion-icon>
      </ion-item>
    </ion-list>

    <!-- Permissões -->
    <ion-list lines="full">
      <ion-item button (click)="abrirPaginaPermissoes()">
        <ion-icon slot="start" name="person-circle-outline" color="primary"></ion-icon>
        <ion-label>Permissões</ion-label>
        <ion-icon slot="end" name="chevron-forward-outline" color="medium"></ion-icon>
      </ion-item>
      <ion-item button (click)="abrirPaginaQueijos()">
        <ion-icon slot="start" name="nutrition-outline" color="primary"></ion-icon>
        <ion-label>Queijos</ion-label>
        <ion-icon slot="end" name="chevron-forward-outline" color="medium"></ion-icon>
      </ion-item>
    </ion-list>

  </ion-content>
</ion-menu>

<div class="ion-page" id="main-content">
  <ion-header>
    <ion-toolbar color="primary">
      <ion-buttons slot="start">
        <ion-menu-toggle>
          <ion-button>
            <ion-icon slot="icon-only" name="menu" style="font-size: 28px; color: white;"></ion-icon>
          </ion-button>
        </ion-menu-toggle>
      </ion-buttons>
      <ion-buttons slot="end" class="admin-toolbar-actions">
        <ion-button class="admin-logout-button" (click)="logout()" title="Sair">
          <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-content class="admin-empty-content"></ion-content>

  <!-- MODAL DE GRÁFICOS DO SISTEMA -->
  <ion-modal [isOpen]="isModalOpen" (didPresent)="chamarGraficosIniciais()" (didDismiss)="setOpen(false)">
    <ng-template>
      <ion-header>
        <ion-toolbar color="tertiary">
          <ion-title>Estatísticas do Sistema</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="setOpen(false)">
              <ion-icon slot="icon-only" name="close-outline"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-segment [(ngModel)]="graficoSelecionado" (ionChange)="trocarGrafico()">
          <ion-segment-button value="barras">
            <ion-icon name="bar-chart-outline"></ion-icon>
            <ion-label>Barras</ion-label>
          </ion-segment-button>
          <ion-segment-button value="pizza">
            <ion-icon name="pie-chart-outline"></ion-icon>
            <ion-label>Pizza</ion-label>
          </ion-segment-button>
        </ion-segment>
        <div *ngIf="isLoading" class="ion-margin-top" style="height: 350px; display: flex; align-items: center; justify-content: center;">
          <ion-spinner name="circles" color="tertiary" style="transform: scale(2);"></ion-spinner>
        </div>
        <div class="ion-margin-top" [style.visibility]="isLoading ? 'hidden' : 'visible'" [style.height]="'350px'">
          <canvas #graficoCanvas></canvas>
        </div>
      </ion-content>
    </ng-template>
  </ion-modal>
</div>
