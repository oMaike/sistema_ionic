<ion-menu contentId="perfil-main-content" class="perfil-menu">
  <ion-header>
    <ion-toolbar>
      <ion-title>Menu</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <ion-list lines="full" class="menu-list">
      <ion-item button (click)="toggleConsultor()">
        <ion-icon slot="start" name="qr-code-outline"></ion-icon>
        <ion-label>Consultor</ion-label>
      </ion-item>
    </ion-list>

    <div *ngIf="consultorAberto" class="consultor-menu-panel">
      <div class="conteudo-card">

        <div class="conteudo-topo">
          <div class="img-pequena-wrap">
            <div class="img-placeholder img-pequena">
              <ion-icon name="image-outline"></ion-icon>
            </div>
          </div>

          <div class="qr-placeholder-wrap">
            <div class="img-placeholder qr-placeholder">
              <ion-icon name="qr-code-outline"></ion-icon>
              <span>QR Code</span>
            </div>
          </div>
        </div>

        <div class="img-grande-wrap">
          <div class="img-placeholder img-grande">
            <ion-icon name="image-outline"></ion-icon>
            <span>Imagem</span>
          </div>
        </div>

        <ion-list lines="none" class="txt-lista">
          <ion-item class="txt-item">
            <ion-textarea
              [(ngModel)]="textoUsuario"
              aria-label="Texto"
              placeholder="Digite aqui suas anotações..."
              [autoGrow]="true"
              rows="4">
            </ion-textarea>
          </ion-item>
        </ion-list>

        <ion-button expand="block" fill="solid" class="btn-enviar-txt" (click)="enviarTexto()">
          Enviar
        </ion-button>

      </div>
    </div>
  </ion-content>
</ion-menu>

<div class="ion-page" id="perfil-main-content">
<ion-header class="perfil-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-toggle>
        <ion-button class="btn-menu" title="Menu">
          <ion-icon name="menu-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-menu-toggle>
    </ion-buttons>
    <ion-title class="perfil-toolbar-title">Meu Perfil</ion-title>
    <ion-buttons slot="end" class="perfil-toolbar-actions">
      <ion-button
        class="perfil-profile-button"
        fill="clear"
        title="Alterar foto de perfil"
        (click)="fotoPerfilInput.click()">
        <ion-avatar>
          <img
            *ngIf="fotoPerfilUrl"
            [src]="fotoPerfilUrl"
            alt="Foto de perfil">
          <span *ngIf="!fotoPerfilUrl" class="perfil-profile-initials">{{ getIniciais() }}</span>
          <ion-icon name="camera-outline" class="perfil-profile-camera"></ion-icon>
        </ion-avatar>
      </ion-button>
      <input
        #fotoPerfilInput
        type="file"
        accept="image/*"
        class="perfil-file-input"
        (change)="selecionarFotoPerfil($event)">
      <ion-button class="btn-logout" (click)="logout()" title="Sair">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="perfil-content" [fullscreen]="true">

  <!-- Fundo decorativo -->
  <div class="bg-deco">
    <div class="deco-blob deco-1"></div>
    <div class="deco-blob deco-2"></div>
  </div>

  <div class="perfil-wrapper">
    <!-- Card de edição -->
    <div class="edit-card">
      <div class="edit-card-header">
        <ion-icon name="create-outline"></ion-icon>
        <span>Informações da Conta</span>
      </div>

      <!-- Nome editável -->
      <div class="field-group" [class.field-dirty]="nomeDirty">
        <label class="field-label">
          <ion-icon name="person-outline"></ion-icon>
          Nome Completo
        </label>
        <div class="field-input-wrap">
          <ion-input
            [(ngModel)]="dados.nome"
            placeholder="Seu nome completo"
            (ionInput)="onNomeChange()"
            autocomplete="name">
          </ion-input>
          <ion-icon *ngIf="nomeDirty" name="ellipse" class="dirty-dot"></ion-icon>
        </div>
      </div>

      <!-- E-mail (somente leitura) -->
      <div class="field-group field-readonly">
        <label class="field-label">
          <ion-icon name="mail-outline"></ion-icon>
          E-mail
          <span class="readonly-badge">Não editável</span>
        </label>
        <div class="field-input-wrap">
          <ion-input [(ngModel)]="dados.email" [readonly]="true" type="email"></ion-input>
          <ion-icon name="lock-closed-outline" class="lock-icon"></ion-icon>
        </div>
      </div>
      
      <!-- Botão salvar -->
      <button
        class="btn-salvar"
        (click)="salvar()"
        [class.btn-loading]="salvando"
        [class.btn-success]="salvouOk"
        [disabled]="salvando || !nomeDirty">
        <span *ngIf="!salvando && !salvouOk">
          <ion-icon name="save-outline"></ion-icon>
          Salvar Alterações
        </span>
        <span *ngIf="salvando" class="loading-dots">
          <span></span><span></span><span></span>
        </span>
        <span *ngIf="salvouOk && !salvando">
          <ion-icon name="checkmark-circle-outline"></ion-icon>
          Salvo!
        </span>
      </button>
    </div>

  </div>

</ion-content>
</div>
