<ion-content class="forgot-content" [fullscreen]="true">
  <main class="forgot-shell">
    <section class="forgot-card" aria-label="Recuperar senha">
      <div class="forgot-visual">
        <div class="brand-mark">
          <img src="assets/icon/favicon.png" alt="Sistema">
        </div>
        <div class="visual-copy">
          <span class="eyebrow">Painel academico</span>
          <h1>Recuperar senha</h1>
          <p>Informe seu e-mail para receber as instrucoes de acesso.</p>
        </div>
      </div>

      <form class="forgot-form" (ngSubmit)="enviar()">
        <div class="field-group" [class.field-error]="erroEmail" [class.field-valid]="email && !erroEmail">
          <label class="field-label">
            <ion-icon name="mail-outline"></ion-icon>
            E-mail
          </label>
          <div class="field-input">
            <ion-input
              name="email"
              type="email"
              [(ngModel)]="email"
              placeholder="nome@email.com"
              autocomplete="email"
              inputmode="email"
              (ionInput)="validarEmail(false)"
              (ionBlur)="validarEmail(true)">
            </ion-input>
          </div>
          <span class="field-msg" *ngIf="erroEmail">{{ erroEmail }}</span>
        </div>

        <ion-button
          type="submit"
          expand="block"
          class="btn-enviar"
          [disabled]="carregando || !email">
          <ion-spinner *ngIf="carregando" name="crescent"></ion-spinner>
          <ng-container *ngIf="!carregando">
            <ion-icon name="send-outline" slot="start"></ion-icon>
            Enviar link
          </ng-container>
        </ion-button>
      </form>

      <div class="forgot-actions">
        <ion-button
          type="button"
          fill="clear"
          class="action-button"
          (click)="voltarLogin()"
          [disabled]="carregando">
          <ion-icon name="log-in-outline" slot="start"></ion-icon>
          Voltar ao login
        </ion-button>
      </div>
    </section>
  </main>
</ion-content>
